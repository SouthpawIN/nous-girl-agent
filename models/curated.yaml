    default: false
    eikon: nous-assistant
    voice:
      source: edge-tts
      edge_voice: en-US-AvaNeural
    music:
      source: playlist
      playlist: plugins/evolution-radio/playlists/default.json
    capabilities: [text, tools]
    notes: |
      Text-only. 15.4GB. Voice falls back to Edge TTS. Music falls back to playlist.
      Heavier reasoning model — good for technical chats.

