# Curated Model Catalog
# Hand-picked by mu. This is the source of truth for what models the Omni VA can serve.
# Suggestions for new entries go in suggested.yaml — you promote from there to here.

# Catalog schema:
# - id:                   unique slug
# - display_name:         human-readable name
# - tier:                 multimodal-native | text-with-tts | api-combo
# - backend:              llama.cpp | ollama | openai-compat | nous-portal
# - model_path:           path to GGUF, or null for API models
# - api_base:             API endpoint (for openai-compat / nous-portal), null otherwise
# - api_key_env:          env var holding the API key, null for local
# - default:              true if this is the launch default
# - eikon:                eikon sprite/persona name (must exist in VA/sprites/)
# - voice:
#     source:             model | edge-tts | melotts | cosyvoice | bark
#     edge_voice:         fallback Edge TTS voice (e.g. en-US-AvaNeural)
#     model_voice_config: optional config for model-native voice output
# - music:
#     source:             model | heartmula | ace-step | playlist | none
#     playlist:           path to playlist JSON, if source=playlist
#     generation_config:  optional config for model-native music output
# - capabilities:         subset of [text, voice, music, vision, tools]
# - notes:                free-form notes from mu

models:
  # === MULTIMODAL NATIVE (default) ===
  - id: qwen-omni-3b
    display_name: Qwen 2.5 Omni 3B
    tier: multimodal-native
    backend: llama.cpp
    model_path: ~/Models/storage/gguf/Qwen2.5-Omni-3B-GGUF/Qwen2.5-Omni-3B-Q4_K_M.gguf
    mmproj_path: ~/Models/storage/gguf/Qwen2.5-Omni-3B-GGUF/mmproj-Qwen2.5-Omni-3B-Q8_0.gguf
    api_base: null
    api_key_env: null
    default: true
    eikon: nous-assistant
    voice:
      source: model
      edge_voice: en-US-AvaNeural
    music:
      source: playlist
      playlist: plugins/evolution-radio/playlists/default.json
    capabilities: [text, voice, vision, tools]
    notes: |
      Default VA model. Multimodal native — text + voice + vision inputs,
      text + voice outputs. 1.96GB GGUF + 1.43GB mmproj. Fits 24GB GPU easily.
      Music still falls back to playlist (no native music output).

  # === TEXT + EDGE TTS FALLBACK ===
