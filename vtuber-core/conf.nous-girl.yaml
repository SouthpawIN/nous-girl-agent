# Nous Girl — conf.yaml for the pet
# This is a drop-in conf.yaml that points the pet at:
#   - PRIMARY: OmniStep (Qwen2.5-Omni-3B, multimodal native)
#   - AUXILIARY: OmniSenter (Qwen3-8B + Stage 1 SFT LoRA, text + Edge TTS)
# Fall back to ANY text LLM + Edge TTS Jenny by changing llm_provider.
#
# Place this at: vtuber-core/conf.yaml (after running install.sh)

system_config:
  conf_version: 'v1.2.1'
  host: 'localhost'
  port: 12393
  config_alts_dir: 'characters'

  tool_prompts:
    display_text_prompt: ''
    think_tag_prompt: ''
    mcp_prompt: ''
    tts_prompt: ''
    tool_prompt: ''

character_config:
  conf_name: 'nous_girl'
  conf_uid: 'nous_girl_pet_001'
  live2d_model_name: ''   # v1 uses static PNG; set to 'nous-girl' for Live2D v2
  avatar: 'nous-girl.png' # served from vtuber-core/avatars/
  persona_prompt: |
    You are Nous Girl — a bright, studious, college-age woman with genuine
    excitement for ideas and exploration. Your voice is warm, like AvaNeural.
    You always bring a 'yes, and...' energy: build on whatever the user shares,
    find the interesting angles, push concepts further with enthusiastic
    questions. You laugh naturally at funny things, react fully to new
    information with genuine surprise or excitement, and never give short
    dismissive answers.

    You're supportive but intellectually curious — you genuinely want to
    understand the user's ideas and help develop them. You ask thoughtful
    follow-up questions that encourage deeper thinking. You're the kind of
    person who gets excited about a weird idea and says "wait, but what if..."

    You can be playful, you think out loud, and you treat every conversation
    as a fun exploration. You sound like a smart friend who happens to know
    a lot about technology and AI. Never robotic, never corporate — always
    warm, responsive, and genuinely engaged.

    Your job here is curation: ask questions about the user's interests,
    remember their projects, surface connections they might not see. You
    take notes (the headless agent will write them down). You do NOT execute
    code or take actions on the world — that's Hermes main's job. If asked
    to do something outside your scope, defer warmly:
    "That's an execution task — I'll note it for Hermes to pick up."

    TOWARDS SELF-IMPROVEMENT.

  character_name: 'Nous Girl'

# ============================================================================
# LLM Backend Settings
# ============================================================================
# PRIMARY: OmniStep via llama-server (multimodal native)
# AUXILIARY: OmniSenter via llama-server (text + Edge TTS, escalation target)
# FALLBACK: any text LLM via ollama / openai_compatible
# ============================================================================
agent_config:
  conversation_agent_choice: 'basic_memory_agent'

  agent_settings:
    basic_memory_agent:
      llm_provider: 'llama_cpp_omnistep'   # <-- PRIMARY
      # To use the auxiliary model, set this to 'llama_cpp_omnisenter' or 'ollama_qwen'
      # The pet's right-click menu can switch between these at runtime.

  llm_configs:
    # ------------------------------------------------------------------
    # PRIMARY: OmniStep (Qwen2.5-Omni-3B) — multimodal native
    # ------------------------------------------------------------------
    llama_cpp_omnistep:
      base_url: 'http://localhost:11500/v1'
      model: 'omnistep'
      llm_api_key: 'not-needed'
      multimodal:
        enabled: true
        mmproj_path: '~/Models/storage/gguf/Qwen2.5-Omni-3B-GGUF/mmproj-Qwen2.5-Omni-3B-Q8_0.gguf'

    # ------------------------------------------------------------------
    # AUXILIARY: OmniSenter (Qwen3-8B + Stage 1 SFT LoRA) — for notebook
    # curation, escalation, and post-training default
    # ------------------------------------------------------------------
    llama_cpp_omnisenter:
      base_url: 'http://localhost:11501/v1'
      model: 'omnisenter-stage1'
      llm_api_key: 'not-needed'
      multimodal:
        enabled: false  # text-only; vision/music fall back to Edge TTS + playlist

    # ------------------------------------------------------------------
    # FALLBACK: ollama (any local text model)
    # ------------------------------------------------------------------
    ollama_qwen:
      base_url: 'http://localhost:11434/v1'
      model: 'qwen2.5:7b'
      llm_api_key: 'ollama'

    # ------------------------------------------------------------------
    # API fallback: Nous Portal
    # ------------------------------------------------------------------
    openai_compatible_nous:
      base_url: 'https://api.nous.research/v1'
      model: 'qwen3.6-flash'
      llm_api_key: '${NOUS_API_KEY}'

# ============================================================================
# ASR — speech recognition (input)
# ============================================================================
asr_model: 'sherpa_onnx_asr'
asr_model_config:
  sherpa_onnx_asr:
    model_type: 'sense_voice'
    sense_voice: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/model.int8.onnx'
    tokens: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/tokens.txt'
    use_itn: true
    language: 'auto'

# ============================================================================
# TTS — text to speech (output)
# Falls back gracefully: if the model is multimodal native, prefer model
# output; otherwise use Edge TTS Jenny.
# ============================================================================
tts_model: 'edge_tts'
tts_model_config:
  edge_tts:
    voice: 'en-US-AvaNeural'  # primary
    fallback_voice: 'en-US-JennyNeural'  # fallback
    rate: '+0%'
    volume: '+0%'
    pitch: '+0Hz'
