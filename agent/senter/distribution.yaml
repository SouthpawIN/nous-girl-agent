name: senter
version: 0.1.0
description: "Senter — on-demand triage orchestrator. Reads curated notes from ~/wiki/pet-curated/, returns a prioritized list. Defers execution to Hermes main."
author: SouthpawIN
license: MIT
hermes_requires: '>=0.12.0'
env_requires: []
distribution_owned:
  - senter-profile.yaml
  - ../prompts/senter-triage.md
  - README.md

notes: |
  Install: `hermes profile install github.com/SouthpawIN/nous-assistant-agent/agent/senter --name senter`
  Run:     `hermes run --profile senter`
  Wiki:    https://southpawin.github.io/
